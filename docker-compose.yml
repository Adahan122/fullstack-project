services:
  backend: 
    build: ./backend
    ports:
      - '5001:5000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      # Мы можем просто передать эту ссылку бэкенду как переменную окружения! 👇
      - DATABASE_URL=postgresql://postgres:1234@host.docker.internal:5432/myshop

  frontend:
    build: ./SportMix
    ports:
      - '5173:5173'
    volumes:
      - ./SportMix:/app
      - /app/node_modules
    depends_on:
      - backend